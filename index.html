<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { color-scheme: light; }
body {
  font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif;
  background: linear-gradient(165deg, #F5F7F0 0%, #EEF1EA 60%, #E8EDE4 100%);
  min-height: 100vh;
  color: #30322D;
  -webkit-font-smoothing: antialiased;
}
.zm { font-family: 'Zen Maru Gothic', sans-serif; }
.app { width: min(100%, 520px); margin: 0 auto; padding: 22px 16px calc(96px + env(safe-area-inset-bottom)); }

@keyframes breathe { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.06);opacity:1} }
@keyframes pulsering { 0%{transform:scale(.78);opacity:.5} 100%{transform:scale(1.5);opacity:0} }
@keyframes sleepbob { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-2px) rotate(1.5deg)} }
@keyframes barfill { from { width: 4% } }
@keyframes toastin { from{opacity:0;transform:translate(-50%,8px)} to{opacity:1;transform:translate(-50%,0)} }
@keyframes fadeup { from{transform:translateY(7px);opacity:0} to{transform:translateY(0);opacity:1} }

.header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.mascot { width:50px; height:50px; border-radius:50%; background:#E4EFE3; display:flex; align-items:center; justify-content:center; flex:none; }
.h-sub { font-size:11px; font-weight:700; letter-spacing:.18em; color:#a7aa9c; }
.h-main { font-size:22px; font-weight:900; line-height:1.2; }
.h-total { margin-left:auto; text-align:right; }
.h-total-lbl { font-size:11px; color:#888B7E; }
.h-total-val { font-size:19px; font-weight:900; color:#7FA889; }

.card { background:#fff; border-radius:20px; padding:22px 18px; box-shadow:0 4px 18px rgba(48,50,45,.08); margin-bottom:16px; }
.card-sm { background:#fff; border-radius:18px; padding:18px; box-shadow:0 2px 8px rgba(48,50,45,.05); margin-bottom:8px; }
.sec-title { font-size:13px; font-weight:700; color:#888B7E; letter-spacing:.1em; margin:22px 0 11px; }

.chips { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
.chip {
  display:flex; align-items:center; gap:7px;
  padding:10px 16px; border-radius:999px;
  border:2px solid #E0DDD2; background:#F7F6EF;
  font-size:14px; cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif; color:#30322D;
  transition:transform .12s, border-color .12s, background .12s;
  -webkit-tap-highlight-color: transparent;
}
.chip:active { transform:scale(.94); border-color:#7FA889; background:#E4EFE3; }
.chip.running {
  border-color:#7FA889; background:#E4EFE3; color:#5e8a69;
  opacity:.6; cursor:not-allowed;
}

@keyframes slidedown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.active-list { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.active-row {
  background:#fff; border-radius:16px; padding:14px 16px;
  box-shadow:0 4px 18px rgba(48,50,45,.08);
  display:flex; align-items:center; gap:12px;
  animation:slidedown .25s ease;
  border-left:4px solid var(--accent-color, #7FA889);
}
.ar-emoji { font-size:24px; flex:none; }
.ar-info { flex:1; min-width:0; }
.ar-name { font-family:'Zen Maru Gothic',sans-serif; font-size:14px; font-weight:700; }
.ar-timer { font-family:'Zen Maru Gothic',sans-serif; font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:.03em; }
.ar-stop {
  background:#EFA888; color:#fff; border:none; border-radius:999px;
  padding:8px 16px; font-size:13px; font-weight:700;
  font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
  flex:none; transition:opacity .15s; -webkit-tap-highlight-color:transparent;
}
.ar-stop:active { opacity:.8; }

.active-card { text-align:center; }
.active-pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#E4EFE3; color:#5e8a69; border-radius:999px;
  padding:6px 16px; font-weight:700; font-size:14px; margin-bottom:18px;
}
.ring-wrap { position:relative; width:188px; height:188px; margin:0 auto 18px; }
.ring-base  { position:absolute; inset:0; border-radius:50%; border:8px solid #E4EFE3; animation:breathe 3.6s ease-in-out infinite; }
.ring-arc   { position:absolute; inset:0; border-radius:50%; border:8px solid transparent; border-top-color:#7FA889; border-right-color:#7FA889; transform:rotate(48deg); }
.ring-pulse { position:absolute; inset:6px; border-radius:50%; border:2px solid #7FA889; opacity:.35; animation:pulsering 3.2s ease-out infinite; }
.ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.timer-num  { font-size:36px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:.03em; }
.watching   { font-size:11px; color:#aab0a2; margin-top:4px; animation:sleepbob 4s ease-in-out infinite; }
.stop-btn {
  background:#EFA888; color:#fff; border:none; border-radius:999px;
  padding:13px 38px; font-size:16px; font-weight:700;
  font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
  transition:opacity .15s; -webkit-tap-highlight-color:transparent;
}
.stop-btn:active { opacity:.8; }

.donut-wrap { display:flex; align-items:center; gap:18px; }
.donut { position:relative; width:104px; height:104px; flex:none; border-radius:50%; }
.donut-hole { position:absolute; inset:17px; background:#fff; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }

.legend { flex:1; display:flex; flex-direction:column; gap:9px; }

.l-chip { width:10px; height:10px; border-radius:3px; flex:none; }
.l-dur { margin-left:auto; color:#888B7E; font-weight:700; }

.empty { text-align:center; color:#a7aa9c; font-size:14px; padding:28px 0; background:#fff; border-radius:18px; box-shadow:0 2px 8px rgba(48,50,45,.05); }

.period-row { display:flex; gap:7px; margin-bottom:14px; }
.per-btn {
  padding:6px 16px; border-radius:999px; font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Zen Kaku Gothic New',sans-serif;
  transition:all .15s; border:1px solid #E0DDD2; background:#F7F6EF; color:#888B7E;
}
.per-btn.on { background:#7FA889; color:#fff; border-color:#7FA889; }

.hist-donut { position:relative; width:160px; height:160px; margin:0 auto; border-radius:50%; }
.hist-hole { position:absolute; inset:26px; background:#fff; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hh-lbl { font-size:11px; color:#888B7E; }
.hh-val { font-size:24px; font-weight:900; }
.hlegend { display:flex; flex-wrap:wrap; gap:8px 14px; justify-content:center; margin-top:16px; }
.hl-row { display:flex; align-items:center; gap:6px; font-size:12px; }
.hl-chip { width:9px; height:9px; border-radius:3px; }

.sess { display:flex; align-items:center; gap:10px; background:#fff; border-radius:10px; padding:11px 14px; box-shadow:0 2px 8px rgba(48,50,45,.05); font-size:13px; margin-bottom:6px; }
.sess-name { flex:1; font-weight:500; }
.sess-time { color:#888B7E; }
.sess-dur  { font-weight:700; min-width:48px; text-align:right; }
.sess-del  { color:#b5b8ac; background:none; border:none; cursor:pointer; font-size:16px; padding:0 0 0 4px; }
.sess-date { font-size:11px; color:#b5b8ac; margin-bottom:4px; margin-top:12px; font-weight:700; letter-spacing:.05em; }

.cat-item {
  display:flex; align-items:center; gap:11px;
  background:#fff; border-radius:12px; padding:12px 14px;
  box-shadow:0 2px 8px rgba(48,50,45,.05); margin-bottom:8px;
}
.ci-del { background:none; border:none; cursor:pointer; font-size:18px; color:#b5b8ac; }
.add-row { display:flex; gap:8px; margin-top:8px; }
.inp-e { width:46px; text-align:center; border:1px solid #E0DDD2; border-radius:10px; padding:9px; font-size:18px; font-family:inherit; background:#F7F6EF; }
.inp-n { flex:1; border:1px solid #E0DDD2; border-radius:10px; padding:9px 12px; font-size:14px; font-family:inherit; background:#F7F6EF; color:#30322D; }
.inp-e:focus,.inp-n:focus { outline:2px solid #7FA889; outline-offset:-1px; }
.add-btn { background:#7FA889; color:#fff; border:none; border-radius:10px; padding:9px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Zen Maru Gothic',sans-serif; }

.export-card { background:#fff; border-radius:16px; padding:16px; box-shadow:0 2px 8px rgba(48,50,45,.05); }
.exp-ta { width:100%; border:1px solid #E0DDD2; border-radius:10px; padding:12px; font-size:12px; font-family:monospace; background:#F7F6EF; color:#30322D; resize:none; min-height:148px; line-height:1.6; }
.copy-btn { width:100%; margin-top:10px; border:none; border-radius:999px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Zen Maru Gothic',sans-serif; color:#fff; transition:background .2s; }
.copy-btn:active { opacity:.85; }
.noah-note { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:18px; color:#b5b8ac; font-size:11px; }

.nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:min(100%, 520px);
  background:rgba(255,255,255,.92); backdrop-filter:blur(12px);
  border-top:1px solid #E0DDD2; display:flex; z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn {
  flex:1; border:none; background:none; padding:11px 0; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-family:'Zen Kaku Gothic New',sans-serif; font-size:10px; font-weight:700;
  color:#b5b8ac; transition:color .15s; -webkit-tap-highlight-color:transparent;
}
.nav-btn.on { color:#7FA889; }

.toast {
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
  background:#30322D; color:#fff; border-radius:999px;
  padding:11px 22px; font-size:13px; font-weight:700;
  z-index:100; font-family:'Zen Maru Gothic',sans-serif;
  white-space:nowrap; box-shadow:0 6px 20px rgba(48,50,45,.25);
  animation:toastin .3s ease; pointer-events:none;
}
.tab { animation:fadeup .3s ease; }
.idb-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:#7FA889; font-weight:700; background:#E4EFE3; border-radius:999px; padding:2px 8px; margin-left:6px; vertical-align:middle; }
</style>

<body>
<div class="app" id="app"><div style="text-align:center;padding:80px 0;color:#a7aa9c">読み込み中...</div></div>
<script>
const COLORS=[
  {val:'#7FA889',soft:'#E4EFE3'},
  {val:'#EFA888',soft:'#FBE9E0'},
  {val:'#8FBED4',soft:'#E4F0F4'},
  {val:'#B6A4D6',soft:'#EFE8F8'},
  {val:'#E5B65C',soft:'#FBF1DC'},
  {val:'#DD9A9A',soft:'#FBEAE9'},
];
const col=i=>COLORS[((i%COLORS.length)+COLORS.length)%COLORS.length];

function defCats(){return[
  {id:'1',name:'ぽんずアプリ開発',emoji:'🍊',color:0},
  {id:'2',name:'ノア開発',emoji:'🌿',color:1},
  {id:'3',name:'インプット',emoji:'📚',color:2},
  {id:'4',name:'仕事',emoji:'💼',color:3},
  {id:'5',name:'休憩',emoji:'☕',color:4},
];}

// ── IndexedDB ──────────────────────────────────────────
const DB_NAME='ponzu-timelog-db', DB_VER=1;
let db;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('sessions')){
        const s=d.createObjectStore('sessions',{keyPath:'id'});
        s.createIndex('startedAt','startedAt',{unique:false});
      }
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}

function idbGetAll(){
  return new Promise(res=>{
    const tx=db.transaction('sessions','readonly');
    const req=tx.objectStore('sessions').getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>res([]);
  });
}

function idbPut(session){
  return new Promise(res=>{
    const tx=db.transaction('sessions','readwrite');
    tx.objectStore('sessions').put(session);
    tx.oncomplete=res;
  });
}

function idbDelete(id){
  return new Promise(res=>{
    const tx=db.transaction('sessions','readwrite');
    tx.objectStore('sessions').delete(id);
    tx.oncomplete=res;
  });
}

// ── localStorage (categories & active timer) ──────────
const lj=k=>{try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let cats=lj('timelog_categories_v1')||defCats();
let actives=(()=>{
  const v2=lj('timelog_actives_v2');
  if(v2) return v2;
  const v1=lj('timelog_active_v1');
  if(v1) return [v1];
  return [];
})();
const saveCats=()=>sv('timelog_categories_v1',cats);
const saveActives=()=>sv('timelog_actives_v2',actives);

// ── In-memory sessions ────────────────────────────────
let sessions=[];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const getCat=id=>cats.find(c=>c.id===id)||{name:'不明',emoji:'❓',color:0};

// ── Migration from localStorage ───────────────────────
async function migrate(){
  const ls=lj('timelog_sessions_v1');
  if(ls&&ls.length>0){
    const existing=await idbGetAll();
    if(existing.length===0){
      for(const s of ls) await idbPut(s);
    }
    localStorage.removeItem('timelog_sessions_v1');
  }
}

// ── Helpers ───────────────────────────────────────────
function fmtDur(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'h'+String(m%60).padStart(2,'0')+'m':m+'m';}
function fmtTimer(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function fmtTime(iso){const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDate(iso){const d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate()+'（'+['日','月','火','水','木','金','土'][d.getDay()]+'）';}
const isToday=iso=>new Date(iso).toLocaleDateString('ja-JP')===new Date().toLocaleDateString('ja-JP');
const isWeek=iso=>{const d=Date.now()-new Date(iso).getTime();return d>=0&&d<7*864e5;};
const isAll=()=>true;

function sum(fn){const t={};sessions.filter(s=>fn(s.startedAt)).forEach(s=>{t[s.categoryId]=(t[s.categoryId]||0)+s.duration});return t;}
function totMs(fn){return sessions.filter(s=>fn(s.startedAt)).reduce((a,s)=>a+s.duration,0);}
function donutBg(totals){
  const entries=cats.filter(c=>totals[c.id]).map(c=>({c,ms:totals[c.id]}));
  const s=entries.reduce((a,e)=>a+e.ms,0);
  if(!s)return'#E4EFE3';
  let acc=0;
  return'conic-gradient('+entries.map(e=>{const st=(acc/s*100).toFixed(2);acc+=e.ms;return col(e.c.color).val+' '+st+'% '+(acc/s*100).toFixed(2)+'%';}).join(',')+')';
}

// ── State ─────────────────────────────────────────────
let tab='home',period='today',toastMsg='',copied=false,expDate=new Date().toISOString().split('T')[0],toastT,copyT,tickT;

// ── Actions ───────────────────────────────────────────
function showToast(msg){toastMsg=msg;render();if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>{toastMsg='';render();},2000);}

function startTimer(id){
  if(actives.find(a=>a.categoryId===id)){showToast('すでに計測中だよ');return;}
  actives.push({id:uid(),categoryId:id,startedAt:new Date().toISOString()});
  saveActives();startTick();render();
}

async function stopTimer(activeId){
  const entry=actives.find(a=>a.id===activeId);
  if(!entry)return;
  const dur=Date.now()-new Date(entry.startedAt).getTime();
  if(dur>3000){
    const s={id:entry.id,categoryId:entry.categoryId,startedAt:entry.startedAt,endedAt:new Date().toISOString(),duration:dur};
    sessions.push(s);
    await idbPut(s);
    showToast('記録しました！ '+fmtDur(dur));
  }
  actives=actives.filter(a=>a.id!==activeId);
  saveActives();
  if(!actives.length)stopTick();
  render();
}

async function delSess(id){
  sessions=sessions.filter(s=>s.id!==id);
  await idbDelete(id);
  render();
}

function addCat(){
  const e=(document.getElementById('ie')?.value.trim())||'⭐';
  const n=document.getElementById('in')?.value.trim();
  if(!n)return;
  cats.push({id:uid(),name:n,emoji:e,color:cats.length%COLORS.length});saveCats();render();
}
function delCat(id){if(!confirm('このカテゴリを削除しますか？（記録は残ります）'))return;cats=cats.filter(c=>c.id!==id);saveCats();render();}

function setExpDate(d){expDate=d;render();}

function buildExp(){
  const target=expDate?new Date(expDate+'T00:00:00'):new Date();
  const isTgt=iso=>new Date(iso).toLocaleDateString('ja-JP')===target.toLocaleDateString('ja-JP');
  const wStart=new Date(target);wStart.setDate(target.getDate()-6);
  const isWk=iso=>{const d=new Date(iso);return d>=wStart&&d<=new Date(target.getFullYear(),target.getMonth(),target.getDate(),23,59,59);};
  const f=d=>(d.getMonth()+1)+'/'+d.getDate();
  const dayLabel=f(target)+'（'+['日','月','火','水','木','金','土'][target.getDay()]+'）';
  const tt=sum(isTgt),wt=sum(isWk),at=sum(isAll),tm=totMs(isTgt),wm=totMs(isWk),am=totMs(isAll);
  const L=['【ぽんず時間ログ】'+f(target),'','▼ '+dayLabel];
  cats.filter(c=>tt[c.id]).forEach(c=>L.push('  '+c.emoji+' '+c.name+': '+fmtDur(tt[c.id])));
  if(!Object.keys(tt).length)L.push('  記録なし');
  L.push('  合計: '+(tm>0?fmtDur(tm):'0分'),'','▼ 今週（'+f(wStart)+'〜'+f(target)+'）');
  cats.filter(c=>wt[c.id]).forEach(c=>L.push('  '+c.emoji+' '+c.name+': '+fmtDur(wt[c.id])));
  if(!Object.keys(wt).length)L.push('  記録なし');
  L.push('  合計: '+(wm>0?fmtDur(wm):'0分'));
  if(am>wm){
    L.push('','▼ 全期間累計');
    cats.filter(c=>at[c.id]).forEach(c=>L.push('  '+c.emoji+' '+c.name+': '+fmtDur(at[c.id])));
    L.push('  合計: '+fmtDur(am));
  }
  return L.join('\n');
}

function copyExp(){navigator.clipboard.writeText(buildExp()).then(()=>{copied=true;render();showToast('✅ コピーしました');if(copyT)clearTimeout(copyT);copyT=setTimeout(()=>{copied=false;render();},2000);});}

function tickUpdate(){
  if(!actives.length)return;
  const now=Date.now();
  actives.forEach(a=>{
    const el=document.getElementById('ar-timer-'+a.id);
    if(el)el.textContent=fmtTimer(now-new Date(a.startedAt).getTime());
  });
  const el2=document.getElementById('today-live');
  const liveExtra=actives.reduce((s,a)=>s+(now-new Date(a.startedAt).getTime()),0);
  if(el2)el2.textContent=(totMs(isToday)+liveExtra)<60000?'0分':fmtDur(totMs(isToday)+liveExtra);
}
function startTick(){stopTick();tickT=setInterval(tickUpdate,1000);}
function stopTick(){if(tickT){clearInterval(tickT);tickT=null;}}

function switchTab(t){tab=t;render();}
function setPer(p){period=p;render();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── SVGs ──────────────────────────────────────────────
const PONZU=`<svg viewBox="0 0 64 64" style="width:44px;height:44px;overflow:visible">
<ellipse cx="14" cy="38" rx="10" ry="13" fill="#fff"/><ellipse cx="50" cy="38" rx="10" ry="13" fill="#fff"/>
<circle cx="22" cy="20" r="11" fill="#fff"/><circle cx="42" cy="20" r="11" fill="#fff"/><circle cx="32" cy="15" r="12" fill="#fff"/>
<circle cx="18" cy="31" r="11" fill="#fff"/><circle cx="46" cy="31" r="11" fill="#fff"/><circle cx="32" cy="34" r="19" fill="#fff"/>
<ellipse cx="25.5" cy="32" rx="2.5" ry="3.1" fill="#30322D"/><ellipse cx="38.5" cy="32" rx="2.5" ry="3.1" fill="#30322D"/>
<circle cx="26.4" cy="31" r=".7" fill="#fff"/><circle cx="39.4" cy="31" r=".7" fill="#fff"/>
<ellipse cx="32" cy="39" rx="3.2" ry="2.4" fill="#30322D"/>
<path d="M32 41 q-2.6 3.4-5.4 1.6 M32 41 q2.6 3.4 5.4 1.6" stroke="#30322D" stroke-width="1.3" fill="none" stroke-linecap="round"/>
<circle cx="20" cy="37" r="2.6" fill="#FBE9E0"/><circle cx="44" cy="37" r="2.6" fill="#FBE9E0"/>
</svg>`;
const NOAH=`<svg viewBox="0 0 64 64" style="width:22px;height:22px;overflow:visible"><ellipse cx="32" cy="27" rx="11" ry="13" fill="#cfcabd"/><path d="M21 28 q0-16 11-16 q11 0 11 16 q-3.5-8-11-8 q-7.5 0-11 8 z" fill="#8a8779"/><ellipse cx="28" cy="29" rx="1.3" ry="1.7" fill="#fff"/><ellipse cx="36" cy="29" rx="1.3" ry="1.7" fill="#fff"/></svg>`;

// ── Render ────────────────────────────────────────────
function render(){
  const filterFn=period==='today'?isToday:period==='week'?isWeek:isAll;
  const hl=period==='today'?'今日':period==='week'?'今週':'全期間';
  const td=sum(isToday),tm=totMs(isToday);
  const now=Date.now();
  const liveExtra=actives.reduce((s,a)=>s+(now-new Date(a.startedAt).getTime()),0);
  const live=tm+liveExtra;
  const hd=sum(filterFn),hm=totMs(filterFn);
  const runningIds=new Set(actives.map(a=>a.categoryId));

  let h=`<div class="header">
<div class="mascot">${PONZU}</div>
<div class="zm"><div class="h-sub">PONZU TIME LOG <span class="idb-badge">💾 IDB</span></div><div class="h-main">ぽんず時間ログ</div></div>
<div class="h-total zm"><div class="h-total-lbl">今日の合計</div><div class="h-total-val" id="today-live">${live<60000?'0分':fmtDur(live)}</div></div>
</div>`;

  if(tab==='home'){
    h+=`<div class="tab">`;
    if(actives.length){
      h+=`<div class="active-list">`;
      actives.forEach(a=>{
        const c=getCat(a.categoryId);
        const elapsed=now-new Date(a.startedAt).getTime();
        const accentColor=col(c.color).val;
        h+=`<div class="active-row" style="--accent-color:${accentColor}">
<span class="ar-emoji">${c.emoji}</span>
<div class="ar-info"><div class="ar-name zm">${esc(c.name)}</div><div class="ar-timer" id="ar-timer-${a.id}" style="color:${accentColor}">${fmtTimer(elapsed)}</div></div>
<button class="ar-stop" onclick="stopTimer('${a.id}')">■ 停止</button>
</div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="card" style="text-align:center"><p style="color:#888B7E;font-size:14px;margin-bottom:16px">${actives.length?'別のカテゴリも同時に計測できるよ':'カテゴリを選んで計測を開始'}</p>
<div class="chips">${cats.map(c=>{const running=runningIds.has(c.id);return`<button class="chip${running?' running':''}" onclick="${running?`showToast('すでに計測中だよ')`:`startTimer('${c.id}')`}"><span style="font-size:18px">${c.emoji}</span>${esc(c.name)}${running?' ▶':''}</button>`;}).join('')}</div></div>`;
    h+=`<div class="sec-title zm">今日の内訳</div>`;
    const tdLive={...td};
    actives.forEach(a=>{const elapsed=now-new Date(a.startedAt).getTime();tdLive[a.categoryId]=(tdLive[a.categoryId]||0)+elapsed;});
    const tb=cats.filter(c=>tdLive[c.id]);
    const tmLive=tm+liveExtra;
    if(!tb.length){
      h+=`<div class="empty">今日の記録はまだありません<br><span style="font-size:24px;display:inline-block;margin-top:8px">🐶</span></div>`;
    } else {
      h+=`<div class="card-sm donut-wrap">
<div class="donut zm" style="background:${donutBg(tdLive)}"><div class="donut-hole"><div class="dh-lbl">今日</div><div class="dh-val">${tmLive>=60000?fmtDur(tmLive):'0分'}</div></div></div>
<div class="legend">${tb.map(c=>`<div class="legend-row"><span class="l-chip" style="background:${col(c.color).val}"></span><span style="font-size:15px">${c.emoji}</span><span>${esc(c.name)}</span><span class="l-dur">${fmtDur(tdLive[c.id])}</span></div>`).join('')}</div>
</div>`;
    }
    h+=`</div>`;
  }
  else if(tab==='history'){
    const hb=cats.filter(c=>hd[c.id]);
    // Group sessions by date for "全期間" view
    const filteredSess=[...sessions].filter(s=>filterFn(s.startedAt)).reverse();
    h+=`<div class="tab">
<div class="period-row">
  <button class="per-btn${period==='today'?' on':''}" onclick="setPer('today')">今日</button>
  <button class="per-btn${period==='week'?' on':''}" onclick="setPer('week')">今週</button>
  <button class="per-btn${period==='all'?' on':''}" onclick="setPer('all')">全期間</button>
</div>
<div class="card" style="text-align:center;margin-bottom:8px">
<div class="hist-donut zm" style="background:${donutBg(hd)}"><div class="hist-hole"><div class="hh-lbl">${hl}の合計</div><div class="hh-val">${hm>0?fmtDur(hm):'0分'}</div></div></div>
<div class="hlegend">${hb.map(c=>`<div class="hl-row"><span class="hl-chip" style="background:${col(c.color).val}"></span>${c.emoji} ${esc(c.name)} <b>${fmtDur(hd[c.id])}</b></div>`).join('')}</div>
</div>
<div class="sec-title zm">${hl}のセッション</div>`;
    if(!filteredSess.length){
      h+=`<div style="text-align:center;color:#a7aa9c;font-size:14px;padding:24px 0">記録がありません</div>`;
    } else if(period==='all'){
      // Group by date
      const byDate={};
      filteredSess.forEach(s=>{
        const dk=new Date(s.startedAt).toLocaleDateString('ja-JP');
        if(!byDate[dk])byDate[dk]={label:fmtDate(s.startedAt),sessions:[]};
        byDate[dk].sessions.push(s);
      });
      Object.values(byDate).forEach(g=>{
        h+=`<div class="sess-date">${g.label}</div>`;
        h+=g.sessions.map(s=>{const c=getCat(s.categoryId);return`<div class="sess"><span style="font-size:16px">${c.emoji}</span><span class="sess-name">${esc(c.name)}</span><span class="sess-time">${fmtTime(s.startedAt)}</span><span class="sess-dur">${fmtDur(s.duration)}</span><button class="sess-del" onclick="delSess('${s.id}')">×</button></div>`;}).join('');
      });
    } else if(period==='week'){
      const byDate={};
      filteredSess.forEach(s=>{
        const dk=new Date(s.startedAt).toLocaleDateString('ja-JP');
        if(!byDate[dk])byDate[dk]={label:fmtDate(s.startedAt),sessions:[]};
        byDate[dk].sessions.push(s);
      });
      Object.values(byDate).forEach(g=>{
        h+=`<div class="sess-date">${g.label}</div>`;
        h+=g.sessions.map(s=>{const c=getCat(s.categoryId);return`<div class="sess"><span style="font-size:16px">${c.emoji}</span><span class="sess-name">${esc(c.name)}</span><span class="sess-time">${fmtTime(s.startedAt)}</span><span class="sess-dur">${fmtDur(s.duration)}</span><button class="sess-del" onclick="delSess('${s.id}')">×</button></div>`;}).join('');
      });
    } else {
      h+=filteredSess.map(s=>{const c=getCat(s.categoryId);return`<div class="sess"><span style="font-size:16px">${c.emoji}</span><span class="sess-name">${esc(c.name)}</span><span class="sess-time">${fmtTime(s.startedAt)}</span><span class="sess-dur">${fmtDur(s.duration)}</span><button class="sess-del" onclick="delSess('${s.id}')">×</button></div>`;}).join('');
    }
    h+=`</div>`;
  }
  else if(tab==='settings'){
    h+=`<div class="tab">
<div class="sec-title zm" style="margin-top:6px">カテゴリ管理</div>
${cats.map(c=>`<div class="cat-item" style="border-left:3px solid ${col(c.color).val}"><span style="font-size:20px">${c.emoji}</span><span style="flex:1;font-weight:500">${esc(c.name)}</span><button class="ci-del" onclick="delCat('${c.id}')">×</button></div>`).join('')}
<div class="add-row"><input id="ie" class="inp-e" placeholder="🍀" maxlength="2"><input id="in" class="inp-n" placeholder="カテゴリ名" maxlength="20"><button class="add-btn" onclick="addCat()">追加</button></div>
<div class="sec-title zm">ノアへのエクスポート</div>
<div class="export-card">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
<label style="font-size:13px;color:#888B7E;font-weight:700">出力日</label>
<input type="date" value="${expDate}" onchange="setExpDate(this.value)" style="border:1px solid #E0DDD2;border-radius:10px;padding:7px 10px;font-size:14px;font-family:inherit;background:#F7F6EF;color:#30322D;flex:1">
</div>
<textarea class="exp-ta" readonly>${esc(buildExp())}</textarea>
<button class="copy-btn" style="background:${copied?'#E5B65C':'#7FA889'}" onclick="copyExp()">${copied?'✅ コピーしました':'📋 コピーしてノアに渡す'}</button>
</div>
<div class="noah-note">${NOAH} 執事ノアに渡せる形式でまとめています</div>
</div>`;
  }

  h+=`<nav class="nav">
<button class="nav-btn${tab==='home'?' on':''}" onclick="switchTab('home')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</button>
<button class="nav-btn${tab==='history'?' on':''}" onclick="switchTab('history')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>記録</button>
<button class="nav-btn${tab==='settings'?' on':''}" onclick="switchTab('settings')">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>設定</button>
</nav>`;

  if(toastMsg)h+=`<div class="toast">${esc(toastMsg)}</div>`;
  document.getElementById('app').innerHTML=h;
}

// ── Init ──────────────────────────────────────────────
(async()=>{
  await openDB();
  await migrate();
  sessions=await idbGetAll();
  if(actives.length)startTick();
  render();
})();
</script>
</body>
</html>
